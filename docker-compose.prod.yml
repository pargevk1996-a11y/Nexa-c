services:
  postgres:
    ports: []

  redis:
    ports: []

  nginx:
    restart: unless-stopped

  api-gateway:
    environment:
      APP_ENV: production
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  auth-service:
    restart: unless-stopped
  user-service:
    restart: unless-stopped
  contact-service:
    restart: unless-stopped
  chat-service:
    restart: unless-stopped
  media-service:
    restart: unless-stopped
  story-service:
    restart: unless-stopped
  emoji-service:
    restart: unless-stopped
  notification-service:
    restart: unless-stopped

  ws-gateway:
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  presence-service:
    restart: unless-stopped

  call-service:
    restart: unless-stopped
    environment:
      LIVEKIT_URL: ${LIVEKIT_URL:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      SFU_MIN_PARTICIPANTS: ${SFU_MIN_PARTICIPANTS:-3}

  # SFU for GROUP calls (> 2 participants). 1:1 calls stay peer-to-peer and never
  # touch this. Host networking: LiveKit needs a wide UDP range for WebRTC media
  # plus the signaling port. Requires the AWS Security Group to allow:
  #   7880 tcp (signaling/WS), 7881 tcp (TURN/TLS fallback), 50000-60000 udp (media).
  # call-service mints join tokens with ${LIVEKIT_API_KEY}/${LIVEKIT_API_SECRET};
  # those MUST match the keys below. Webhook posts back to call-service over the
  # internal network for room-state reconciliation.
  livekit:
    image: livekit/livekit-server:v1.8
    restart: unless-stopped
    network_mode: host
    # Single SFU node — no Redis needed. For multi-node scaling add
    # --redis-host (with the stack's Redis password) so nodes share room state.
    command:
      - --bind
      - 0.0.0.0
      - --node-ip
      - 18.145.177.213
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
      # Webhook back to the SFU integration in call-service (signed; verified there).
      LIVEKIT_WEBHOOK_URLS: ${LIVEKIT_WEBHOOK_URL:-http://127.0.0.1:8011/api/v1/livekit/webhook}

  # TURN/STUN relay for WebRTC media (calls). Host networking so the wide UDP
  # relay range works without mapping thousands of ports. Requires the AWS
  # Security Group to allow: 3478 udp+tcp, and 49152-65535 udp (relay range).
  coturn:
    image: coturn/coturn:4.6
    restart: unless-stopped
    network_mode: host
    command:
      - -n
      - --use-auth-secret
      - --static-auth-secret=${TURN_SECRET}
      - --realm=nexa-c.com
      - --listening-port=3478
      - --min-port=49152
      - --max-port=65535
      - --external-ip=18.145.177.213
      - --no-tls
      - --no-dtls
      - --no-cli
      - --log-file=stdout
      - --fingerprint
