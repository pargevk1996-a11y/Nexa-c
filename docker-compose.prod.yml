services:
  postgres:
    ports: []

  redis:
    ports: []

  nginx:
    restart: unless-stopped

  api-gateway:
    environment:
      APP_ENV: production
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  auth-service:
    restart: unless-stopped
  user-service:
    restart: unless-stopped
  contact-service:
    restart: unless-stopped
  chat-service:
    restart: unless-stopped
  media-service:
    restart: unless-stopped
  story-service:
    restart: unless-stopped
  emoji-service:
    restart: unless-stopped
  notification-service:
    restart: unless-stopped

  ws-gateway:
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  presence-service:
    restart: unless-stopped

  call-service:
    restart: unless-stopped

  # TURN/STUN relay for WebRTC media (calls). Host networking so the wide UDP
  # relay range works without mapping thousands of ports. Requires the AWS
  # Security Group to allow: 3478 udp+tcp, and 49152-65535 udp (relay range).
  coturn:
    image: coturn/coturn:4.6
    restart: unless-stopped
    network_mode: host
    command:
      - -n
      - --use-auth-secret
      - --static-auth-secret=${TURN_SECRET}
      - --realm=nexa-c.com
      - --listening-port=3478
      - --min-port=49152
      - --max-port=65535
      - --external-ip=18.145.177.213
      - --no-tls
      - --no-dtls
      - --no-cli
      - --log-file=stdout
      - --fingerprint
