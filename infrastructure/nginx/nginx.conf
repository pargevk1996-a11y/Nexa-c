worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # SECURITY: never log query strings. The default "combined" format logs
    # $request (which includes ?access_token=...&ticket=...). We log $uri (the
    # decoded path only) so tokens / secrets passed as query params never reach
    # the access log. Applies to every server/location unless overridden.
    log_format main_safe '$remote_addr - $remote_user [$time_local] '
                         '"$request_method $uri $server_protocol" '
                         '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main_safe;

    # Docker embedded DNS — re-resolve upstream on each request
    resolver 127.0.0.11 valid=10s ipv6=off;

    include /etc/nginx/conf.d/*.conf;
}
