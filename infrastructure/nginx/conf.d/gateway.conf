upstream api_gateway {
    zone api_gateway 64k;
    server api-gateway:8000 resolve;
}

upstream ws_gateway {
    zone ws_gateway 64k;
    server ws-gateway:8009 resolve;
}

# Cache policy by path: content-hashed bundles under /assets/ are immutable
# (cache forever); everything else — index.html, /sw.js, the SPA shell — is
# revalidated every load so new deploys appear instantly on ALL devices/OSes
# instead of being served stale from the browser cache.
map $uri $cache_control {
    default        "no-cache";
    "~^/assets/"   "public, max-age=31536000, immutable";
}

server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # Document-level Permissions-Policy: camera/mic allowed only for our own origin
    # (consumed by WebRTC calls after the browser's user-consent prompt); geolocation,
    # payment and usb are fully disabled — the app never requests them.
    add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(self), payment=(), usb=()" always;
    # CSP: no unsafe-inline/eval in script-src.
    # The sha256 hash permits the one static inline script (theme-init IIFE) in index.html.
    # style-src allows 'unsafe-inline' for CSS-in-JS runtime and Google Fonts.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self' 'sha256-n3nrNlr95WUIXO8+oYho6UgsOHx9uRELEfWn6UIWvvY='; style-src 'self'; font-src 'self'; connect-src 'self' wss: https://accounts.google.com https://oauth2.googleapis.com https://github.com https://api.github.com https://openidconnect.googleapis.com; img-src 'self' data: blob:; media-src 'self' blob:; worker-src 'self' blob:; upgrade-insecure-requests" always;
    # Cache policy (see $cache_control map above): fresh HTML/SW, immutable assets.
    add_header Cache-Control $cache_control always;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        proxy_pass http://api_gateway/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/ws {
        proxy_pass http://ws_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /api/ {
        proxy_pass http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /ws/ {
        proxy_pass http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }
}
