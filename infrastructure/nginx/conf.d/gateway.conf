upstream api_gateway {
    zone api_gateway 64k;
    server api-gateway:8000 resolve;
}

upstream ws_gateway {
    zone ws_gateway 64k;
    server ws-gateway:8009 resolve;
}

# Cache policy by path: content-hashed bundles under /assets/ are immutable
# (cache forever); everything else — index.html, /sw.js, the SPA shell — is
# revalidated every load so new deploys appear instantly on ALL devices/OSes
# instead of being served stale from the browser cache.
map $uri $cache_control {
    default        "no-cache";
    "~^/assets/"   "public, max-age=31536000, immutable";
}

server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # A+ cipher hardening: 256-bit only, ECDHE forward-secrecy, no AES-128.
    # TLS 1.3 ciphers are fixed by the spec; ssl_conf_command restricts them to
    # the two strongest (no AES-128-GCM which is the TLS1.3 default fallback).
    ssl_ciphers               ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_ecdh_curve            secp384r1:X25519;
    ssl_conf_command          Ciphersuites TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256;

    # Session cache (performance) + disable tickets (tickets can weaken PFS
    # if ticket keys aren't rotated frequently — disabling scores better on PFS checks).
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # Document-level Permissions-Policy: camera/mic allowed only for our own origin
    # (consumed by WebRTC calls after the browser's user-consent prompt); geolocation,
    # payment and usb are fully disabled — the app never requests them.
    add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(self), payment=(), usb=()" always;

    # Cross-origin isolation (enterprise hardening).
    # COOP: prevents cross-origin windows from getting a reference to this window.
    # CORP: marks every response "same-origin only" so other sites can't hotlink.
    # COEP: requires all subresources to opt in (or be same-origin). Safe here because
    #       all fonts/assets are self-hosted — zero third-party origins on any page.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # Reporting API v1 — absolute URL so the browser knows where to POST reports
    # even before it has parsed the page. $scheme/$http_host resolve dynamically.
    add_header Reporting-Endpoints "csp-endpoint=\"$scheme://$http_host/api/v1/security/csp-report\"" always;

    # CSP: no unsafe-inline/eval in script-src.
    # The sha256 hash permits the one static inline script (theme-init IIFE) in index.html.
    # Fonts are self-hosted so font-src/'style-src stay 'self' only.
    # report-uri (all browsers) + report-to (Reporting API v1, modern browsers).
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self' 'sha256-moPbuZ3t9evLl0rh92Mfhwz9dOTBOyjmCeFBclLouuc='; style-src 'self'; font-src 'self'; connect-src 'self' https://accounts.google.com https://oauth2.googleapis.com https://github.com https://api.github.com https://openidconnect.googleapis.com; img-src 'self' data: blob:; media-src 'self' blob:; worker-src 'self' blob:; upgrade-insecure-requests; report-uri /api/v1/security/csp-report; report-to csp-endpoint" always;
    # Cache policy (see $cache_control map above): fresh HTML/SW, immutable assets.
    add_header Cache-Control $cache_control always;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        proxy_pass http://api_gateway/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/ws {
        proxy_pass http://ws_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /api/ {
        proxy_pass http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /ws/ {
        proxy_pass http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }
}
