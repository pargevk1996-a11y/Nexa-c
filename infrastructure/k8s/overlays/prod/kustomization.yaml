apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: nexa
resources:
  - ../../base
  - hpa.yaml
  - pdb.yaml
patches:
  - target:
      kind: ConfigMap
      name: nexa-env
    patch: |-
      - op: replace
        path: /data/APP_ENV
        value: production
  # api-gateway: 3 replicas in prod
  - target:
      kind: Deployment
      name: api-gateway
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  # chat-service: 3 replicas in prod (high write volume)
  - target:
      kind: Deployment
      name: chat-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  # ws-gateway: 3 replicas in prod (high connection count)
  - target:
      kind: Deployment
      name: ws-gateway
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  # Resource limits patch for all Deployments (tighter prod limits)
  - path: resource-limits.yaml
    target:
      kind: Deployment
      name: api-gateway
  - path: resource-limits-high.yaml
    target:
      kind: Deployment
      name: chat-service
  - path: resource-limits-high.yaml
    target:
      kind: Deployment
      name: ws-gateway
  - path: resource-limits-high.yaml
    target:
      kind: Deployment
      name: media-service
