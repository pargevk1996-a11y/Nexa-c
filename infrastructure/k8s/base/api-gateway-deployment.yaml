apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: nexa
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/example/nexa-api-gateway:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: nexa-env
            - secretRef:
                name: nexa-secrets
                optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: nexa
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8000
      targetPort: 8000
