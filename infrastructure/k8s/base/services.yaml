# Nexa microservice Deployments + Services (all except api-gateway which is in api-gateway-deployment.yaml)
# Port map: auth=8001, user=8002, contact=8003, chat=8004, media=8005, story=8006,
#           emoji=8007, notification=8008, ws-gateway=8009, presence=8010, call=8011, ai=8012

# ── auth-service ──────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: nexa
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8001"
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/example/nexa-auth-service:latest
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: nexa-env
            - secretRef:
                name: nexa-secrets
                optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: nexa
spec:
  selector:
    app: auth-service
  ports:
    - port: 8001
      targetPort: 8001
---
