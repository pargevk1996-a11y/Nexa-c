# External Secrets Operator — pulls secrets from AWS Secrets Manager.
# Requires ESO to be installed: https://external-secrets.io/latest/introduction/getting-started/
#
# Create the AWS Secrets Manager secret at:
#   nexa/prod/app (keys: DATABASE_URL, REDIS_URL, SECRET_KEY, SMTP_PASSWORD, ...)
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  namespace: nexa
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-west-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: nexa
  annotations:
    # IRSA: replace with your EKS OIDC ARN after terraform apply
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/nexa-prod-external-secrets"
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nexa-secrets
  namespace: nexa
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: nexa-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: nexa/prod/app
