<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="dark light" />
<title>Nexa — secure-first messenger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:root, [data-theme="dark"] {
  --bg:#050508; --panel:#0b0c11; --panel2:#12141c; --panel3:#1a1d27;
  --text:#f3f4f8; --muted:#8b91a4; --faint:#565c70;
  --accent:#4d7cff; --accent2:#6a5bff; --cyan:#2fe6c8;
  --them:#181b24; --line:rgba(255,255,255,.07); --line2:rgba(255,255,255,.12);
  --hover:rgba(255,255,255,.05); --input:#0f1118;
  --shadow:0 18px 50px rgba(0,0,0,.5);
}
[data-theme="light"] {
  --bg:#eef1f8; --panel:#ffffff; --panel2:#f4f6fc; --panel3:#e9edf7;
  --text:#0e1018; --muted:#5b6175; --faint:#9aa0b4;
  --accent:#4d7cff; --accent2:#6a5bff; --cyan:#0fb9a0;
  --them:#eef1f8; --line:rgba(10,12,30,.08); --line2:rgba(10,12,30,.14);
  --hover:rgba(10,12,30,.04); --input:#f0f2fa;
  --shadow:0 18px 50px rgba(40,50,90,.16);
}
:root{ --grad:linear-gradient(135deg,var(--accent),var(--accent2));
  --glow:0 0 22px rgba(77,124,255,.45); }

*{box-sizing:border-box; margin:0; padding:0}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text);
  font-size:14px; -webkit-font-smoothing:antialiased; overflow:hidden;
  transition:background .25s,color .25s;
}
::selection{background:rgba(77,124,255,.35)}
:focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:8px}
button{font-family:inherit; color:inherit; cursor:pointer; background:none; border:none}
input,textarea{font-family:inherit; color:inherit}
.font-grotesk{font-family:'Space Grotesk',sans-serif}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:var(--line2); border-radius:8px}
::-webkit-scrollbar-track{background:transparent}

/* ============ APP GRID ============ */
.app{
  display:grid; height:100vh;
  grid-template-columns:82px 336px 1fr 300px;
}
.app.has-info-hidden{grid-template-columns:82px 336px 1fr}
@media(max-width:1200px){ .app,.app.has-info-hidden{grid-template-columns:82px 336px 1fr} .info{display:none!important} }

/* ============ RAIL ============ */
.rail{
  background:var(--panel); border-right:1px solid var(--line);
  display:flex; flex-direction:column; align-items:center; padding:16px 0 14px; gap:6px;
}
.brand{display:flex; flex-direction:column; align-items:center; gap:6px; margin-bottom:14px}
.logo{
  width:46px;height:46px;border-radius:14px;background:var(--grad);
  display:grid;place-items:center; box-shadow:var(--glow);
  font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:24px; color:#fff;
}
.wordmark{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:11px; letter-spacing:.22em; color:var(--muted)}
.rail-nav{display:flex; flex-direction:column; gap:4px; flex:1; width:100%; align-items:center; padding-top:6px}
.rail-bottom{display:flex; flex-direction:column; align-items:center; gap:8px; width:100%; padding-top:12px; margin-top:4px; border-top:1px solid var(--line)}
.rail-btn{
  width:60px; height:54px; border-radius:16px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:3px; color:var(--muted);
  font-size:9.5px; font-weight:600; transition:.16s; position:relative;
}
.rail-btn .ic{font-size:20px; line-height:1}
.rail-btn:hover{background:var(--hover); color:var(--text)}
.rail-btn.active{color:var(--text); background:var(--panel3)}
.rail-btn.active::before{content:""; position:absolute; left:-1px; top:14px; bottom:14px; width:3px; border-radius:3px; background:var(--grad); box-shadow:var(--glow)}
.rail-badge{position:absolute; top:7px; right:9px; min-width:16px; height:16px; padding:0 4px; border-radius:9px; background:var(--grad); color:#fff; font-size:9px; font-weight:700; display:grid; place-items:center}
.theme-toggle{
  width:52px;height:52px;border-radius:16px; background:var(--panel2); border:1px solid var(--line);
  display:grid;place-items:center; font-size:20px; transition:.16s;
}
.theme-toggle:hover{border-color:var(--accent)}

/* ============ LIST ============ */
.list{background:var(--panel); border-right:1px solid var(--line); display:flex; flex-direction:column; min-height:0}
.list-head{padding:18px 18px 12px; display:flex; align-items:center; justify-content:space-between}
.list-title{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:22px}
.icon-btn{width:38px;height:38px;border-radius:12px; display:grid;place-items:center; color:var(--muted); transition:.16s; border:1px solid transparent}
.icon-btn:hover{background:var(--hover); color:var(--text)}
.new-btn{background:var(--grad); color:#fff; box-shadow:var(--glow)}
.new-btn:hover{filter:brightness(1.08)}
.status-line{margin:0 18px 12px; display:flex; align-items:center; gap:7px; font-size:11.5px; color:var(--muted); font-weight:500}
.dot{width:8px;height:8px;border-radius:50%; background:var(--cyan); box-shadow:0 0 8px var(--cyan); animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.search{margin:0 18px 12px; position:relative}
.search input{width:100%; padding:10px 12px 10px 36px; border-radius:12px; background:var(--input); border:1px solid var(--line); font-size:13px; outline:none; transition:.16s}
.search input:focus{border-color:var(--accent); box-shadow:0 0 0 3px rgba(77,124,255,.15)}
.search .si{position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--faint); font-size:13px}
.folders{display:flex; gap:6px; padding:0 18px 10px; overflow-x:auto; scrollbar-width:none}
.folders::-webkit-scrollbar{display:none}
.folder{flex:none; padding:7px 13px; border-radius:999px; background:var(--panel2); border:1px solid var(--line); font-size:12px; font-weight:600; color:var(--muted); transition:.16s; display:flex; gap:6px; align-items:center}
.folder:hover{color:var(--text)}
.folder.active{background:var(--grad); color:#fff; border-color:transparent; box-shadow:var(--glow)}
.folder .cnt{font-size:10px; opacity:.75; background:rgba(255,255,255,.18); border-radius:8px; padding:0 5px}
.folder.active .cnt{background:rgba(255,255,255,.25)}
.folder-add{flex:none; width:30px; height:30px; border-radius:50%; background:var(--grad); color:#fff;
  font-size:19px; font-weight:600; line-height:1; display:grid; place-items:center; box-shadow:var(--glow);
  animation:addIn .26s cubic-bezier(.34,1.56,.64,1); transition:transform .14s, filter .14s}
.folder-add:hover{transform:scale(1.12) rotate(90deg); filter:brightness(1.1)}
@keyframes addIn{from{transform:scale(0) rotate(-90deg); opacity:0} to{transform:scale(1) rotate(0); opacity:1}}
.chats{flex:1; overflow-y:auto; min-height:0; padding:4px 10px 14px}
.sec-label{font-size:10.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); padding:12px 8px 6px}
.chat-row{display:flex; gap:11px; padding:10px; border-radius:14px; cursor:pointer; transition:.14s; position:relative; align-items:center}
.chat-row:hover{background:var(--hover)}
.chat-row.active{background:var(--panel3)}
.chat-row.active::after{content:""; position:absolute; left:0; top:12px; bottom:12px; width:3px; border-radius:3px; background:var(--grad)}
.av{width:46px;height:46px;border-radius:15px; display:grid; place-items:center; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:17px; color:#fff; flex:none; position:relative}
.av .pres{position:absolute; right:-2px; bottom:-2px; width:13px;height:13px; border-radius:50%; border:2.5px solid var(--panel); background:var(--faint)}
.av .pres.on{background:var(--cyan); box-shadow:0 0 8px var(--cyan)}
.chat-meta{flex:1; min-width:0}
.chat-top{display:flex; align-items:center; gap:6px}
.chat-name{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:14.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.lock-i{font-size:11px; color:var(--cyan); flex:none}
.timer-badge{font-size:10px; color:var(--accent); flex:none}
.chat-time{margin-left:auto; font-size:11px; color:var(--faint); flex:none}
.chat-bottom{display:flex; align-items:center; gap:6px; margin-top:3px}
.preview{flex:1; min-width:0; font-size:12.5px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.preview .react{margin-right:4px}
.unread{min-width:20px; height:20px; padding:0 6px; border-radius:10px; background:var(--grad); color:#fff; font-size:11px; font-weight:700; display:grid; place-items:center; flex:none}
.pin{color:var(--faint); font-size:12px}

/* ============ CHAT ============ */
.chat{display:flex; flex-direction:column; min-width:0; background:var(--bg)}
.chat-header{display:flex; align-items:center; gap:12px; padding:14px 20px; border-bottom:1px solid var(--line); background:var(--panel)}
.back-btn{display:none}
.chat-header .av{width:42px;height:42px;font-size:16px}
.ch-info{flex:1; min-width:0}
.ch-name{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:16px; display:flex; align-items:center; gap:7px}
.ch-sub{font-size:11.5px; color:var(--muted); display:flex; align-items:center; gap:5px; margin-top:2px}
.ch-sub .c{color:var(--cyan)}
.ch-actions{display:flex; gap:4px}
.messages{flex:1; overflow-y:auto; min-height:0; padding:18px 22px; display:flex; flex-direction:column; gap:10px}
.e2e-banner{align-self:center; max-width:80%; text-align:center; font-size:11.5px; color:var(--cyan); background:rgba(47,230,200,.08); border:1px solid rgba(47,230,200,.2); padding:8px 16px; border-radius:12px; margin-bottom:6px}
.row{display:flex; max-width:74%}
.row.me{align-self:flex-end; flex-direction:column; align-items:flex-end}
.row.them{align-self:flex-start; flex-direction:column; align-items:flex-start}
.bubble{padding:9px 13px; border-radius:18px; font-size:13.5px; line-height:1.45; position:relative; word-wrap:break-word}
.row.me .bubble{background:var(--grad); color:#fff; border-bottom-right-radius:5px; box-shadow:0 6px 18px rgba(77,124,255,.28)}
.row.them .bubble{background:var(--them); border:1px solid var(--line); border-bottom-left-radius:5px}
.reply-q{border-left:2.5px solid currentColor; padding:3px 8px; margin-bottom:5px; font-size:12px; opacity:.85; border-radius:5px; background:rgba(255,255,255,.08)}
.reply-q b{display:block; font-size:11px; opacity:.9}
.meta{display:flex; align-items:center; gap:5px; margin-top:4px; padding:0 4px; font-size:10.5px; color:var(--faint)}
.row.me .meta{flex-direction:row-reverse}
.ticks{color:var(--cyan)}
.reactions{display:flex; gap:4px; margin-top:5px; flex-wrap:wrap; padding:0 2px}
.react-chip{font-size:11px; padding:2px 7px; border-radius:999px; background:var(--panel3); border:1px solid var(--line); transition:.14s; display:flex; gap:3px; align-items:center}
.react-chip:hover{border-color:var(--accent); transform:translateY(-1px)}
.react-chip.mine{background:rgba(77,124,255,.2); border-color:var(--accent)}
.react-chip .n{font-size:10px; color:var(--muted)}
/* voice bubble */
.voice{display:flex; align-items:center; gap:10px; min-width:200px}
.voice .play{width:34px;height:34px;border-radius:50%; background:rgba(255,255,255,.18); display:grid; place-items:center; font-size:13px; flex:none}
.row.them .voice .play{background:var(--panel3)}
.wave{display:flex; align-items:center; gap:2px; height:24px; flex:1}
.wave span{flex:1; background:currentColor; opacity:.55; border-radius:2px; min-width:2px}
.voice .dur{font-size:11px; opacity:.85}
.transcript{margin-top:7px; font-size:12px; opacity:.92; display:flex; gap:5px; align-items:flex-start}
.transcript .sp{flex:none}
/* one-time media */
.once{display:flex; align-items:center; gap:10px; min-width:180px; cursor:pointer}
.once .eye{width:38px;height:38px;border-radius:12px; background:rgba(255,255,255,.16); display:grid; place-items:center; font-size:17px; flex:none}
.row.them .once .eye{background:var(--panel3)}
.once .ot{font-size:12.5px; font-weight:600}
.once .os{font-size:11px; opacity:.8}
.once.viewed{opacity:.5}

/* composer */
.composer{padding:10px 18px 16px; border-top:1px solid var(--line); background:var(--panel)}
.smart{display:flex; gap:7px; margin-bottom:9px; overflow-x:auto; scrollbar-width:none; align-items:center}
.smart::-webkit-scrollbar{display:none}
.smart .lbl{font-size:11px; color:var(--cyan); font-weight:600; flex:none; display:flex; gap:4px; align-items:center}
.smart-chip{flex:none; padding:7px 13px; border-radius:999px; background:var(--panel2); border:1px solid var(--line2); font-size:12.5px; font-weight:500; transition:.16s}
.smart-chip:hover{border-color:var(--accent); background:var(--panel3); transform:translateY(-1px)}
.comp-row{display:flex; align-items:flex-end; gap:8px; background:var(--input); border:1px solid var(--line); border-radius:18px; padding:6px 8px; transition:.16s}
.comp-row:focus-within{border-color:var(--accent); box-shadow:0 0 0 3px rgba(77,124,255,.13)}
.comp-btn{width:40px;height:40px;border-radius:12px; display:grid; place-items:center; font-size:18px; color:var(--muted); transition:.14s; flex:none}
.comp-btn:hover{background:var(--hover); color:var(--text)}
.comp-btn.on{color:var(--accent); background:rgba(77,124,255,.15)}
.comp-btn.rec{color:#fff; background:var(--grad); animation:pulse 1.1s infinite}
.comp-input{flex:1; background:none; border:none; outline:none; resize:none; font-size:14px; padding:11px 6px; max-height:120px; line-height:1.4}
.send-btn{background:var(--grad); color:#fff; box-shadow:var(--glow)}
.mode-hint{font-size:11px; color:var(--accent); margin-top:7px; display:none; gap:6px; align-items:center}
.mode-hint.show{display:flex}

/* ============ INFO PANEL ============ */
.info{background:var(--panel); border-left:1px solid var(--line); display:flex; flex-direction:column; padding:24px 20px; overflow-y:auto; gap:18px}
.info-av{display:flex; flex-direction:column; align-items:center; gap:10px; text-align:center}
.info-av .av{width:84px;height:84px;border-radius:26px; font-size:30px}
.info-name{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:18px; display:flex; gap:7px; align-items:center}
.info-status{font-size:12px; color:var(--muted); display:flex; gap:5px; align-items:center}
.shield{display:flex; align-items:center; justify-content:center; gap:8px; padding:11px; border-radius:14px; background:rgba(47,230,200,.08); border:1px solid rgba(47,230,200,.22); color:var(--cyan); font-size:12.5px; font-weight:600}
.feat-list{display:flex; flex-direction:column; gap:2px}
.feat{display:flex; align-items:center; gap:11px; padding:11px 8px; border-radius:12px; transition:.14s}
.feat:hover{background:var(--hover)}
.feat .fi{font-size:17px; width:24px; text-align:center}
.feat .ft{flex:1}
.feat .ft b{display:block; font-size:13px; font-weight:500; font-family:'Space Grotesk',sans-serif}
.feat .ft small{font-size:11px; color:var(--muted)}
.feat .fv{font-size:11.5px; color:var(--cyan); font-weight:600}

/* ============ SECTION PANES (assistant/calls/notes/settings) ============ */
.pane{grid-column:2 / -1; display:none; flex-direction:column; min-height:0; background:var(--bg)}
.pane.show{display:flex}
.app.section-view{grid-template-columns:82px 1fr!important}
.pane-head{padding:22px 28px 16px; border-bottom:1px solid var(--line); background:var(--panel)}
.pane-head h2{font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:700}
.pane-head p{font-size:12.5px; color:var(--muted); margin-top:4px; display:flex; gap:6px; align-items:center}
.pane-body{flex:1; overflow-y:auto; padding:26px 28px; min-height:0}
.center-wrap{max-width:760px; margin:0 auto}

/* assistant empty */
.assist{display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; min-height:100%; gap:20px}
.orb{width:120px;height:120px;border-radius:50%; background:radial-gradient(circle at 38% 32%,var(--accent),var(--accent2) 60%,#3a2bc0); box-shadow:0 0 60px rgba(106,91,255,.5); animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-12px) scale(1.04)}}
.assist h3{font-family:'Space Grotesk',sans-serif; font-size:24px; font-weight:700}
.assist p{color:var(--muted); max-width:420px}
.quick{display:grid; grid-template-columns:repeat(2,1fr); gap:12px; width:100%; max-width:520px; margin-top:6px}
.qa{display:flex; gap:12px; align-items:center; padding:16px; border-radius:16px; background:var(--panel); border:1px solid var(--line); text-align:left; transition:.16s}
.qa:hover{border-color:var(--accent); transform:translateY(-2px); box-shadow:var(--shadow)}
.qa .qi{font-size:22px}
.qa b{font-family:'Space Grotesk',sans-serif; font-size:14px; display:block}
.qa small{font-size:11.5px; color:var(--muted)}

/* calls */
.call-row{display:flex; align-items:center; gap:13px; padding:13px; border-radius:14px; transition:.14s}
.call-row:hover{background:var(--hover)}
.call-row .ci{font-size:16px; width:30px; text-align:center}
.call-row .cm{flex:1}
.call-row .cm b{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:14px; display:flex; gap:6px; align-items:center}
.call-row .cm small{font-size:11.5px; color:var(--muted)}
.call-row .cd{font-size:11px; color:var(--faint)}
.call-row .cbtns{display:flex; gap:6px}
.circles{display:flex; gap:14px; margin-bottom:22px; overflow-x:auto; padding-bottom:6px}
.vcircle{flex:none; width:74px; text-align:center}
.vcircle .vc{width:74px;height:74px;border-radius:50%; background:var(--grad); display:grid; place-items:center; font-size:26px; color:#fff; position:relative; border:2px solid var(--cyan)}
.vcircle small{font-size:11px; color:var(--muted); display:block; margin-top:6px}

/* settings */
.set-group{background:var(--panel); border:1px solid var(--line); border-radius:18px; margin-bottom:18px; overflow:hidden}
.set-group.security{border-color:rgba(47,230,200,.25); background:linear-gradient(180deg,rgba(47,230,200,.06),transparent)}
.set-gh{padding:15px 18px; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:14px; display:flex; align-items:center; gap:8px; border-bottom:1px solid var(--line)}
.set-row{display:flex; align-items:center; gap:13px; padding:14px 18px; border-top:1px solid var(--line)}
.set-row:first-of-type{border-top:none}
.set-row .si2{font-size:18px; width:26px; text-align:center}
.set-row .st{flex:1}
.set-row .st b{font-size:13.5px; font-weight:500; font-family:'Space Grotesk',sans-serif; display:block}
.set-row .st small{font-size:11.5px; color:var(--muted)}
.switch{width:44px;height:26px;border-radius:999px; background:var(--panel3); border:1px solid var(--line2); position:relative; transition:.18s; flex:none}
.switch::after{content:""; position:absolute; top:2px; left:2px; width:20px;height:20px;border-radius:50%; background:var(--faint); transition:.18s}
.switch.on{background:var(--grad); border-color:transparent}
.switch.on::after{left:20px; background:#fff}
.seg{display:flex; gap:4px; background:var(--panel3); padding:3px; border-radius:10px}
.seg button{padding:5px 11px; border-radius:8px; font-size:12px; font-weight:600; color:var(--muted)}
.seg button.on{background:var(--grad); color:#fff}

/* ============ ADD MODAL ============ */
.modal-back{position:fixed; inset:0; z-index:90; background:rgba(3,4,10,.55); backdrop-filter:blur(6px);
  display:grid; place-items:center; opacity:0; transition:opacity .2s; padding:20px}
.modal-back.show{opacity:1}
.modal-card{width:min(420px,94vw); background:var(--panel); border:1px solid var(--line2); border-radius:22px;
  box-shadow:var(--shadow); overflow:hidden; transform:translateY(18px) scale(.96); opacity:0; transition:.24s cubic-bezier(.34,1.4,.64,1)}
.modal-back.show .modal-card{transform:none; opacity:1}
.modal-h{display:flex; align-items:center; gap:12px; padding:18px 18px 14px; border-bottom:1px solid var(--line)}
.modal-ic{width:44px;height:44px;border-radius:14px; background:var(--grad); display:grid; place-items:center; font-size:21px; box-shadow:var(--glow); flex:none}
.modal-h b{font-family:'Space Grotesk',sans-serif; font-size:16px; display:block}
.modal-h small{font-size:11.5px; color:var(--cyan)}
.modal-h .modal-x{margin-left:auto; width:32px;height:32px;border-radius:10px; color:var(--muted); display:grid;place-items:center; font-size:14px}
.modal-h .modal-x:hover{background:var(--hover); color:var(--text)}
.modal-b{padding:16px 18px 20px}
.add-item{display:flex; align-items:center; gap:11px; width:100%; padding:9px; border-radius:13px; transition:.14s; text-align:left}
.add-item:hover{background:var(--hover)}
.add-item .ai-m{flex:1}
.add-item .ai-m b{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:14px; display:block}
.add-item .ai-m small{font-size:11.5px; color:var(--muted)}
.add-item .ai-add{width:28px;height:28px;border-radius:50%; background:var(--panel3); display:grid; place-items:center; color:var(--accent); font-size:16px; transition:.14s}
.add-item:hover .ai-add{background:var(--grad); color:#fff}
.modal-create{width:100%; padding:13px; border-radius:14px; background:var(--grad); color:#fff; font-weight:600; font-size:14px; box-shadow:var(--glow); transition:.14s}
.modal-create:hover{filter:brightness(1.08)}

/* ============ TOASTS ============ */
.toasts{position:fixed; bottom:22px; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; gap:8px; z-index:100; align-items:center}
.toast{background:var(--panel3); border:1px solid var(--line2); color:var(--text); padding:11px 18px; border-radius:13px; font-size:13px; box-shadow:var(--shadow); display:flex; gap:9px; align-items:center; animation:tin .25s; max-width:90vw}
.toast .tb{width:6px;height:6px;border-radius:50%; background:var(--cyan); box-shadow:0 0 6px var(--cyan)}
@keyframes tin{from{opacity:0; transform:translateY(14px)}to{opacity:1}}

/* ============ MOBILE ============ */
@media(max-width:768px){
  .app, .app.section-view, .app.has-info-hidden{grid-template-columns:1fr!important}
  .rail{position:fixed; bottom:0; left:0; right:0; top:auto; z-index:50; flex-direction:row; height:62px; padding:0 4px; border-right:none; border-top:1px solid var(--line)}
  .brand{display:none}
  .rail-nav{flex-direction:row; padding:0; flex:1; justify-content:space-around}
  .rail-bottom{flex-direction:row; border-top:none; padding-top:0; margin-top:0; width:auto; gap:2px; align-items:center}
  .rail-btn{width:auto; flex:1; height:54px}
  .theme-toggle{width:46px;height:46px}
  .list,.chat,.pane{grid-column:1 / -1!important; padding-bottom:62px}
  .list{display:flex}
  body.in-chat .list{display:none}
  body:not(.in-chat) .chat{display:none}
  .chat{padding-bottom:62px}
  .back-btn{display:grid}
  .pane{padding-bottom:62px}
}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- ===== RAIL ===== -->
  <aside class="rail">
    <div class="brand">
      <div class="logo">N</div>
      <div class="wordmark">NEXA</div>
    </div>
    <nav class="rail-nav" id="railNav">
      <button class="rail-btn active" data-section="chats"><span class="ic">💬</span>Чаты<span class="rail-badge" id="railUnread">5</span></button>
      <button class="rail-btn" data-section="assistant"><span class="ic">✨</span>Ассистент</button>
      <button class="rail-btn" data-section="calls"><span class="ic">📞</span>Звонки</button>
      <button class="rail-btn" data-section="notes"><span class="ic">🔖</span>Заметки</button>
    </nav>
    <div class="rail-bottom">
      <button class="rail-btn" data-section="settings"><span class="ic">⚙️</span>Настройки</button>
      <button class="theme-toggle" id="themeToggle" title="Сменить тему" aria-label="Сменить тему">🌙</button>
    </div>
  </aside>

  <!-- ===== LIST ===== -->
  <section class="list" id="listPane">
    <div class="list-head">
      <span class="list-title font-grotesk">Чаты</span>
    </div>
    <div class="status-line"><span class="dot"></span> Подключено · realtime · <span style="color:var(--cyan)">🔒 зашифровано</span></div>
    <div class="search"><span class="si">🔍</span><input id="search" placeholder="Поиск по чатам" oninput="renderChats()"></div>
    <div class="folders" id="folders"></div>
    <div class="chats" id="chatList"></div>
  </section>

  <!-- ===== CHAT ===== -->
  <section class="chat" id="chatPane">
    <header class="chat-header" id="chatHeader"></header>
    <div class="messages" id="messages"></div>
    <div class="composer">
      <div class="smart" id="smart"><span class="lbl">✨ Умные ответы</span></div>
      <div class="comp-row">
        <button class="comp-btn" id="attachBtn" title="Вложение до 4 ГБ" onclick="toast('Вложение: файл до 4 ГБ','📎')">📎</button>
        <button class="comp-btn" id="onceBtn" title="Одноразовое медиа" onclick="toggleMode('once')">👁</button>
        <textarea class="comp-input" id="input" rows="1" placeholder="Сообщение · 🔒 end-to-end" onkeydown="onKey(event)" oninput="autogrow(this)"></textarea>
        <button class="comp-btn" id="schedBtn" title="Отправка по приходу в сеть" onclick="toggleMode('sched')">⏰</button>
        <button class="comp-btn" id="voiceBtn" title="Голос → текст" onclick="toggleVoice()">🎤</button>
        <button class="comp-btn send-btn" id="sendBtn" title="Отправить" onclick="sendText()">➤</button>
      </div>
      <div class="mode-hint" id="modeHint"></div>
    </div>
  </section>

  <!-- ===== INFO ===== -->
  <aside class="info" id="infoPane"></aside>

  <!-- ===== SECTION PANES ===== -->
  <section class="pane" id="paneAssistant"></section>
  <section class="pane" id="paneCalls"></section>
  <section class="pane" id="paneNotes"></section>
  <section class="pane" id="paneSettings"></section>
</div>
<div class="toasts" id="toasts"></div>

<script>
/* ============ STATE ============ */
const AV = ['linear-gradient(135deg,#4d7cff,#6a5bff)','linear-gradient(135deg,#2fe6c8,#4d7cff)','linear-gradient(135deg,#ff7eb6,#6a5bff)','linear-gradient(135deg,#ffb648,#ff5e7e)','linear-gradient(135deg,#34d399,#2fe6c8)','linear-gradient(135deg,#a78bfa,#4d7cff)'];
const state = {
  theme:'dark', section:'chats', folder:'all', active:'c1',
  once:false, sched:false, recording:false,
};
const chats = [
  {id:'c1', name:'Алиса Кей', a:0, on:true, enc:true, timer:false, folder:'personal', pinned:true, time:'14:32', preview:'Отправила ключи 🔑', react:'❤️', unread:2, status:'в сети', sub:'был(а) только что'},
  {id:'c2', name:'Команда Nexa', a:1, on:true, enc:true, timer:false, folder:'groups', pinned:true, time:'13:10', preview:'Деплой прошёл ✓✓', react:'', unread:0, status:'12 участников', sub:'12 участников'},
  {id:'c3', name:'Марк', a:2, on:false, enc:true, timer:true, folder:'personal', pinned:false, time:'12:48', preview:'🎤 Голосовое · 0:14', react:'🔥', unread:1, status:'не в сети', sub:'был(а) 2 ч назад'},
  {id:'c4', name:'Security News', a:3, on:false, enc:true, timer:false, folder:'channels', pinned:false, time:'вчера', preview:'Новый аудит безопасности', react:'', unread:0, status:'канал', sub:'8.2k подписчиков'},
  {id:'c5', name:'Дарья', a:4, on:true, enc:true, timer:false, folder:'personal', pinned:false, time:'вчера', preview:'👁 Одноразовое фото', react:'', unread:0, status:'в сети', sub:'в сети'},
  {id:'c6', name:'Проект Orbit', a:5, on:false, enc:true, timer:true, folder:'groups', pinned:false, time:'пн', preview:'Созвон в 15:00', react:'👍', unread:0, status:'5 участников', sub:'5 участников'},
];
const messages = {
  c1:[
    {id:1, them:true, text:'Привет! Скинула тебе ключи для нового окружения 🔑', time:'14:28', reacts:[]},
    {id:2, me:true, text:'Принял, спасибо. Всё зашифровано?', time:'14:29', ticks:2, reacts:[]},
    {id:3, them:true, kind:'voice', dur:'0:09', transcript:'Да, конечно — end-to-end по умолчанию, как всегда.', time:'14:30', reacts:[{e:'❤️',n:1,mine:true}]},
    {id:4, me:true, text:'Идеально 🔒', time:'14:31', ticks:2, reply:{name:'Алиса Кей', text:'end-to-end по умолчанию'}, reacts:[]},
    {id:5, them:true, kind:'once', time:'14:32', reacts:[]},
  ],
  c2:[
    {id:1, them:true, text:'Деплой прошёл, все сервисы healthy ✓', time:'13:08', reacts:[{e:'🚀',n:3}]},
    {id:2, me:true, text:'Отлично, мониторю realtime-канал', time:'13:10', ticks:2, reacts:[]},
  ],
  c3:[
    {id:1, them:true, kind:'voice', dur:'0:14', transcript:'Слушай, по таймеру исчезающих — поставь 24 часа.', time:'12:46', reacts:[]},
    {id:2, me:true, text:'Сделал ⏲', time:'12:48', ticks:1, reacts:[{e:'🔥',n:1}]},
  ],
  c4:[ {id:1, them:true, text:'📢 Опубликован новый отчёт по аудиту безопасности Nexa.', time:'вчера', reacts:[]} ],
  c5:[ {id:1, them:true, kind:'once', time:'вчера', reacts:[]} ],
  c6:[ {id:1, them:true, text:'Созвон по Orbit в 15:00, не забудьте 👍', time:'пн', reacts:[{e:'👍',n:2,mine:true}]} ],
};
const smartReplies = {
  c1:['Спасибо! 🔒','Понял, проверю','Когда созвон?'],
  c2:['Отличная работа 🚀','Жду апдейт','Принято ✓'],
  c3:['Ок, ставлю ⏲','Согласен','Перезвоню'],
  c4:['Интересно','Поделюсь командой'],
  c5:['👁 Смотрю','Спасибо!'],
  c6:['Буду 👍','Отметил в календаре'],
};
const folders = [
  {id:'all', name:'Все'}, {id:'personal', name:'Личные'},
  {id:'groups', name:'Группы'}, {id:'channels', name:'Каналы'},
];

/* ============ HELPERS ============ */
const $ = s => document.querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
function initials(n){return n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();}
function toast(msg, icon){
  const t = el('div','toast', `<span class="tb"></span>${icon?icon+' ':''}${msg}`);
  $('#toasts').appendChild(t);
  setTimeout(()=>{t.style.opacity='0'; t.style.transition='.3s'; setTimeout(()=>t.remove(),300);}, 2600);
}
function autogrow(t){t.style.height='auto'; t.style.height=Math.min(t.scrollHeight,120)+'px';}

/* ============ FOLDERS ============ */
function addMeta(ctx){
  if(ctx==='groups') return {icon:'👥', title:'Новая группа'};
  if(ctx==='channels') return {icon:'📣', title:'Новый канал'};
  return {icon:'🔍', title:'Найти контакт'};
}
function renderFolders(){
  const box=$('#folders'); box.innerHTML='';
  folders.forEach(f=>{
    const active = state.folder===f.id;
    const cnt = f.id==='all'? chats.length : chats.filter(c=>c.folder===f.id).length;
    const b=el('button','folder'+(active?' active':''), `${f.name}<span class="cnt">${cnt}</span>`);
    b.onclick=()=>{state.folder=f.id; renderFolders(); renderChats();};
    box.appendChild(b);
    // Dynamic "+" lives next to the ACTIVE folder only: All/Личные → find
    // contact, Группы → new group, Каналы → new channel. It animates in and
    // leaves the previous spot automatically (re-rendered for the active one).
    if(active){
      const m=addMeta(f.id);
      const add=el('button','folder-add', '+');
      add.title=m.title; add.setAttribute('aria-label', m.title);
      add.onclick=(e)=>{ e.stopPropagation(); openAdd(f.id); };
      box.appendChild(add);
    }
  });
}

/* ============ ADD MODAL (contacts / group / channel) ============ */
const SUGGEST=[
  {n:'Ева Лин',h:'@eva_lin',a:2,on:true}, {n:'Том Рид',h:'@tomr',a:4,on:false},
  {n:'Майя Сол',h:'@maya',a:5,on:true}, {n:'Лео Кан',h:'@leok',a:1,on:false},
];
function openAdd(ctx){
  const m=addMeta(ctx);
  const isFind = ctx!=='groups' && ctx!=='channels';
  const back=el('div','modal-back');
  const card=el('div','modal-card');
  card.innerHTML=`
    <div class="modal-h">
      <span class="modal-ic">${m.icon}</span>
      <div><b>${m.title}</b><small>🔒 ${isFind?'поиск контакта зашифрован':'создаётся с E2E-шифрованием'}</small></div>
      <button class="modal-x" aria-label="Закрыть">✕</button>
    </div>
    <div class="modal-b">
      <div class="search" style="margin:0 0 14px"><span class="si">${isFind?'🔍':'✏️'}</span>
        <input id="addInput" placeholder="${isFind?'Имя или @username':(ctx==='groups'?'Название группы':'Название канала')}"></div>
      ${isFind
        ? `<div class="sec-label" style="padding:2px 2px 8px">Предложения</div>`+SUGGEST.map(s=>`
            <button class="add-item" data-n="${s.n}">
              <span class="av" style="width:40px;height:40px;border-radius:13px;font-size:14px;background:${AV[s.a]}">${initials(s.n)}<span class="pres ${s.on?'on':''}"></span></span>
              <span class="ai-m"><b>${s.n}</b><small>${s.h}</small></span>
              <span class="ai-add">＋</span>
            </button>`).join('')
        : `<button class="modal-create">Создать ${ctx==='groups'?'группу':'канал'}</button>`}
    </div>`;
  back.appendChild(card); document.body.appendChild(back);
  requestAnimationFrame(()=>back.classList.add('show'));
  const close=()=>{ back.classList.remove('show'); document.removeEventListener('keydown',esc); setTimeout(()=>back.remove(),220); };
  const esc=e=>{ if(e.key==='Escape') close(); };
  back.onclick=e=>{ if(e.target===back) close(); };
  card.querySelector('.modal-x').onclick=close;
  document.addEventListener('keydown',esc);
  card.querySelectorAll('.add-item').forEach(b=>b.onclick=()=>{ close(); toast('Контакт добавлен: '+b.dataset.n,'🔒'); });
  const cr=card.querySelector('.modal-create');
  if(cr) cr.onclick=()=>{ const v=card.querySelector('#addInput').value.trim()||(ctx==='groups'?'Группа':'Канал'); close(); toast((ctx==='groups'?'Группа создана: ':'Канал создан: ')+v, ctx==='groups'?'👥':'📣'); };
  setTimeout(()=>card.querySelector('#addInput')?.focus(),70);
}

/* ============ CHAT LIST ============ */
function renderChats(){
  const box=$('#chatList'); box.innerHTML='';
  const q=($('#search').value||'').toLowerCase();
  let list=chats.filter(c=> (state.folder==='all'||c.folder===state.folder) && c.name.toLowerCase().includes(q));
  const pinned=list.filter(c=>c.pinned), normal=list.filter(c=>!c.pinned);
  const section=(label,arr)=>{
    if(!arr.length) return;
    box.appendChild(el('div','sec-label',label));
    arr.forEach(c=>box.appendChild(chatRow(c)));
  };
  section('📌 Закреплённые', pinned);
  section('Чаты', normal);
  if(!list.length) box.appendChild(el('div','sec-label','Ничего не найдено'));
}
function chatRow(c){
  const r=el('div','chat-row'+(state.active===c.id?' active':''));
  r.innerHTML=`
    <div class="av" style="background:${AV[c.a]}">${initials(c.name)}<span class="pres ${c.on?'on':''}"></span></div>
    <div class="chat-meta">
      <div class="chat-top">
        <span class="chat-name">${c.name}</span>
        ${c.enc?'<span class="lock-i">🔒</span>':''}
        ${c.timer?'<span class="timer-badge">⏲</span>':''}
        <span class="chat-time">${c.time}</span>
      </div>
      <div class="chat-bottom">
        <span class="preview">${c.react?`<span class="react">${c.react}</span>`:''}${c.preview}</span>
        ${c.unread?`<span class="unread">${c.unread}</span>`:(c.pinned?'<span class="pin">📌</span>':'')}
      </div>
    </div>`;
  r.onclick=()=>openChat(c.id);
  return r;
}

/* ============ OPEN / RENDER CHAT ============ */
function openChat(id){
  state.active=id;
  const c=chats.find(x=>x.id===id); if(c){c.unread=0;}
  document.body.classList.add('in-chat');
  renderChats(); renderHeader(); renderMessages(); renderSmart(); renderInfo(); updateUnreadBadge();
}
function renderHeader(){
  const c=chats.find(x=>x.id===state.active);
  $('#chatHeader').innerHTML=`
    <button class="icon-btn back-btn" onclick="document.body.classList.remove('in-chat')">‹</button>
    <div class="av" style="background:${AV[c.a]}">${initials(c.name)}<span class="pres ${c.on?'on':''}"></span></div>
    <div class="ch-info">
      <div class="ch-name">${c.name} <span class="lock-i">🔒</span></div>
      <div class="ch-sub"><span class="c">зашифровано end-to-end</span> · ${c.sub}</div>
    </div>
    <div class="ch-actions">
      <button class="icon-btn" title="Звонок" onclick="toast('Звонок зашифрован','🔒')">📞</button>
      <button class="icon-btn" title="Видео" onclick="toast('Видеозвонок зашифрован','🔒')">🎥</button>
      <button class="icon-btn" title="Поиск" onclick="toast('Поиск по чату','🔍')">🔍</button>
    </div>`;
}
function renderMessages(){
  const box=$('#messages'); box.innerHTML='';
  box.appendChild(el('div','e2e-banner','🔒 Сообщения защищены сквозным шифрованием Nexa'));
  (messages[state.active]||[]).forEach(m=>box.appendChild(msgRow(m)));
  box.scrollTop=box.scrollHeight;
}
function msgRow(m){
  const r=el('div','row '+(m.me?'me':'them'));
  let body='';
  if(m.kind==='voice'){
    body=`<div class="voice">
        <span class="play">▶</span>
        <span class="wave">${Array.from({length:22},()=>`<span style="height:${20+Math.random()*70}%"></span>`).join('')}</span>
        <span class="dur">${m.dur}</span>
      </div>
      <div class="transcript"><span class="sp">✨</span><span>${m.transcript}</span></div>`;
  } else if(m.kind==='once'){
    body=`<div class="once" onclick="this.classList.add('viewed'); toast('Одноразовое медиа просмотрено','👁')">
        <span class="eye">👁</span>
        <span><span class="ot">Одноразовое фото</span><br><span class="os">Нажмите, чтобы посмотреть · исчезнет</span></span>
      </div>`;
  } else {
    body=(m.reply?`<div class="reply-q"><b>${m.reply.name}</b>${m.reply.text}</div>`:'')+m.text;
  }
  const bubble=el('div','bubble', body);
  r.appendChild(bubble);
  // meta
  const meta=el('div','meta', `<span>${m.time}</span>${m.me?`<span class="ticks">${m.ticks>=2?'✓✓':'✓'}</span>`:''}`);
  r.appendChild(meta);
  // reactions
  if(m.reacts && m.reacts.length){
    const rc=el('div','reactions');
    m.reacts.forEach(x=>{
      const chip=el('button','react-chip'+(x.mine?' mine':''), `${x.e}${x.n>1?`<span class="n">${x.n}</span>`:''}`);
      chip.onclick=()=>{x.mine=!x.mine; x.n+=x.mine?1:-1; if(x.n<1){m.reacts=m.reacts.filter(y=>y!==x);} renderMessages(); toast(x.mine?'Реакция добавлена':'Реакция убрана', x.e);};
      rc.appendChild(chip);
    });
    r.appendChild(rc);
  }
  // double-click to react
  bubble.ondblclick=()=>{ if(!m.reacts) m.reacts=[]; const f=m.reacts.find(y=>y.e==='👍'); if(f){f.n++;}else{m.reacts.push({e:'👍',n:1,mine:true});} renderMessages(); toast('Реакция 👍','👍'); };
  return r;
}
function renderSmart(){
  const box=$('#smart'); box.innerHTML='<span class="lbl">✨ Умные ответы</span>';
  (smartReplies[state.active]||[]).forEach(s=>{
    const b=el('button','smart-chip',s);
    b.onclick=()=>{ pushMessage(s); toast('Отправлено','✓'); };
    box.appendChild(b);
  });
}
function renderInfo(){
  const c=chats.find(x=>x.id===state.active);
  $('#infoPane').innerHTML=`
    <div class="info-av">
      <div class="av" style="background:${AV[c.a]}">${initials(c.name)}<span class="pres ${c.on?'on':''}"></span></div>
      <div class="info-name font-grotesk">${c.name} <span class="lock-i">🔒</span></div>
      <div class="info-status"><span class="dot" style="${c.on?'':'background:var(--faint);box-shadow:none;animation:none'}"></span>${c.status}</div>
    </div>
    <div class="shield">🛡 Защищённый чат</div>
    <div class="feat-list">
      <div class="feat"><span class="fi">🔒</span><span class="ft"><b>Шифрование</b><small>end-to-end по умолчанию</small></span><span class="fv">Вкл</span></div>
      <div class="feat"><span class="fi">⏲</span><span class="ft"><b>Исчезающие</b><small>таймер сообщений</small></span><span class="fv">${c.timer?'24 ч':'Выкл'}</span></div>
      <div class="feat"><span class="fi">👁</span><span class="ft"><b>Одноразовое медиа</b><small>просмотр один раз</small></span><span class="fv">Доступно</span></div>
      <div class="feat"><span class="fi">📎</span><span class="ft"><b>Файлы</b><small>до 4 ГБ, зашифрованы</small></span><span class="fv">4 ГБ</span></div>
      <div class="feat"><span class="fi">🔄</span><span class="ft"><b>Синхронизация</b><small>кросс-девайс realtime</small></span><span class="fv">Активна</span></div>
      <div class="feat"><span class="fi">📞</span><span class="ft"><b>Звонки</b><small>аудио / видео</small></span><span class="fv">🔒</span></div>
    </div>`;
}
function pushMessage(text, kind){
  const arr=messages[state.active]||(messages[state.active]=[]);
  const id=arr.length?Math.max(...arr.map(m=>m.id))+1:1;
  const now=new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  if(kind==='voice'){
    arr.push({id, me:true, kind:'voice', dur:'0:'+String(3+Math.floor(Math.random()*9)).padStart(2,'0'), transcript:text, time:now, ticks:2, reacts:[]});
  } else if(state.once){
    arr.push({id, me:true, kind:'once', time:now, ticks:2, reacts:[]});
  } else {
    arr.push({id, me:true, text, time:now, ticks:state.sched?1:2, reacts:[]});
  }
  const c=chats.find(x=>x.id===state.active); c.preview=kind==='voice'?'🎤 Голосовое':(state.once?'👁 Одноразовое медиа':text); c.time=now; c.react='';
  renderMessages(); renderChats();
}

/* ============ COMPOSER ============ */
function sendText(){
  const inp=$('#input'); const v=inp.value.trim();
  if(state.once){ pushMessage('', null); toast('Одноразовое медиа отправлено','👁'); inp.value=''; autogrow(inp); return; }
  if(!v) return;
  if(state.sched){ pushMessage(v); toast('Отправится при подключении адресата','⏰'); }
  else { pushMessage(v); }
  inp.value=''; autogrow(inp);
}
function onKey(e){ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendText(); } }
function toggleMode(m){
  state[m]=!state[m];
  $(m==='once'?'#onceBtn':'#schedBtn').classList.toggle('on', state[m]);
  const hint=$('#modeHint');
  const parts=[];
  if(state.once) parts.push('👁 Одноразовый режим: медиа исчезнет после просмотра');
  if(state.sched) parts.push('⏰ Отложка: отправится по приходу адресата в сеть');
  hint.innerHTML=parts.join(' · '); hint.classList.toggle('show', parts.length>0);
  toast(state[m]?(m==='once'?'Одноразовый режим включён':'Отложенная отправка включена'):'Режим выключен', m==='once'?'👁':'⏰');
}
function toggleVoice(){
  state.recording=!state.recording;
  $('#voiceBtn').classList.toggle('rec', state.recording);
  if(state.recording){ toast('Запись голоса…','🎤'); }
  else {
    const samples=['Отправляю голосовое — Nexa сразу расшифрует.','Понял тебя, всё в силе на завтра.','Ключи получил, спасибо большое!','Созвонимся после деплоя.'];
    pushMessage(samples[Math.floor(Math.random()*samples.length)], 'voice');
    toast('Голос расшифрован ✨','🎤');
  }
}

/* ============ SECTIONS ============ */
function setSection(s){
  state.section=s;
  document.querySelectorAll('.rail-btn').forEach(b=>b.classList.toggle('active', b.dataset.section===s));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('show'));
  const app=$('#app');
  const isChats = s==='chats';
  $('#listPane').style.display = isChats?'flex':'none';
  $('#chatPane').style.display = isChats?'flex':'none';
  $('#infoPane').style.display = isChats?'flex':'none';
  app.classList.toggle('section-view', !isChats);
  if(isChats){ document.body.classList.remove('in-chat'); return; }
  const map={assistant:renderAssistant, calls:renderCalls, notes:renderNotes, settings:renderSettings};
  const pane=$('#pane'+s.charAt(0).toUpperCase()+s.slice(1));
  if(pane){ map[s](pane); pane.classList.add('show'); }
}

}

  const calls=[
    {ic:'📞', dir:'in', name:'Алиса Кей', sub:'Входящий аудио · 12:40', d:'8 мин'},

  ];

    <div class="pane-body"><div class="center-wrap">
      <div class="sec-label">Видеокружки</div>

        ${chats.filter(c=>c.on).map(c=>`<div class="vcircle"><div class="vc" style="background:${AV[c.a]}">🎥</div><small>${c.name.split(' ')[0]}</small></div>`).join('')}
      </div>
      <div class="sec-label">История</div>
      ${calls.map(c=>`<div class="call-row">
        <span class="ci" style="color:${c.dir==='miss'?'#ff5e7e':'var(--cyan)'}">${c.ic}</span>

        <span class="cd">${c.d}</span>

      </div>`).join('')}
    </div></div>`;
}

    <div class="pane-body"><div class="center-wrap" style="max-width:640px">
      <div class="e2e-banner" style="margin-bottom:16px">🔒 Заметки синхронизируются между устройствами в realtime и зашифрованы</div>

      <div class="row me" style="max-width:80%; margin-left:auto"><div class="bubble">Ссылка на дашборд realtime-метрик 📊</div><div class="meta" style="flex-direction:row-reverse"><span>вчера</span><span class="ticks">✓✓</span></div></div>
    </div></div>`;
}
function renderSettings(p){
  const sw=(on)=>`<button class="switch ${on?'on':''}" onclick="this.classList.toggle('on'); toast(this.classList.contains('on')?'Включено':'Выключено', this.classList.contains('on')?'✓':'✕')"></button>`;
  p.innerHTML=`
    <div class="pane-head"><h2>⚙️ Настройки</h2><p>Профиль · приватность · удобство</p></div>

        <div class="set-row"><span class="si2">🛡</span><div class="st"><b>Безопасный режим</b><small>писать могут только контакты</small></div>${sw(true)}</div>
      </div>
      <div class="set-group">
        <div class="set-gh">✨ Удобство</div>

        <div class="set-row"><span class="si2">🔄</span><div class="st"><b>Realtime-синхрон</b><small>мгновенно между устройствами</small></div>${sw(true)}</div>

}
function seg(b){ b.parentNode.querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); toast('Сохранено','✓'); }

/* ============ THEME ============ */
function setTheme(t){
  state.theme=t;
  document.documentElement.setAttribute('data-theme', t);
  $('#themeToggle').textContent = t==='dark'?'🌙':'☀️';
  if(state.section==='settings') renderSettings($('#paneSettings'));
}
$('#themeToggle').onclick=()=>{ setTheme(state.theme==='dark'?'light':'dark'); toast(state.theme==='dark'?'Тёмная тема':'Светлая тема', state.theme==='dark'?'🌙':'☀️'); };

/* ============ MISC ============ */
function updateUnreadBadge(){
  const n=chats.reduce((s,c)=>s+(c.unread||0),0);
  const b=$('#railUnread'); if(n>0){b.style.display='grid'; b.textContent=n;} else b.style.display='none';
}
document.querySelector('.rail').addEventListener('click', e=>{ const b=e.target.closest('.rail-btn'); if(b && b.dataset.section) setSection(b.dataset.section); });

/* ============ INIT ============ */
renderFolders(); renderChats(); openChat('c1'); setSection('chats'); updateUnreadBadge();
</script>
