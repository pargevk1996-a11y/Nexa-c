<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#050508" id="meta-theme-color" />
    <script>
      (function () {
        var theme = "dark";
        try {
          // Device-wide theme lives in the "nexa-theme" key as a plain string
          // ("light" | "dark" | "system"). The old code read a securechat_settings
          // JSON blob that no longer exists, so light users flashed dark on first
          // paint and the theme-color meta was wrong (BUG-021).
          var v = localStorage.getItem("nexa-theme");
          if (v === "light" || v === "dark") theme = v;
          else if (v === "system" && window.matchMedia("(prefers-color-scheme: light)").matches)
            theme = "light";
        } catch (e) {}
        document.documentElement.dataset.theme = theme;
        var meta = document.getElementById("meta-theme-color");
        if (meta) meta.content = theme === "light" ? "#f0f2fa" : "#050508";
        // Low-end device detection: ≤2 CPU cores OR ≤512 MB RAM OR no IdleCallback.
        // Sets data-perf="low" on <html> so CSS can strip backdrop-filter, blur, and
        // animations — the main GPU killers on refrigerators / low-end TVs / phones.
        try {
          var lowCpu = navigator.hardwareConcurrency <= 2;
          var lowRam = navigator.deviceMemory !== undefined && navigator.deviceMemory <= 0.5;
          var oldBrowser = typeof window.requestIdleCallback === "undefined";
          if (lowCpu || lowRam || oldBrowser) document.documentElement.dataset.perf = "low";
        } catch (e) {}
      })();
    </script>
    <meta http-equiv="ScreenCapture" content="deny" />
    <meta name="robots" content="index, follow" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!-- Single source of truth for the marketing description, mirrored across
         meta description / og:description / twitter:description (BUG-016). -->
    <meta
      name="description"
      content="Nexa — private messaging with speed and clarity. Encrypted in transit and at rest, realtime, built on microservices."
    />
    <meta name="application-name" content="Nexa" />
    <link rel="canonical" href="https://nexa-c.com/" />
    <meta property="og:title" content="Nexa — Secure Messenger" />
    <meta
      property="og:description"
      content="Nexa — private messaging with speed and clarity. Encrypted in transit and at rest, realtime, built on microservices."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nexa-c.com/" />
    <meta property="og:site_name" content="Nexa" />
    <!-- Dedicated 1200×630 social card instead of the square favicon (BUG-015). -->
    <meta property="og:image" content="https://nexa-c.com/og-image.png" />
    <meta property="og:image:secure_url" content="https://nexa-c.com/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Nexa — secure-first messenger" />
    <!-- Large rich preview card on X/Twitter (BUG-022). -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nexa — Secure Messenger" />
    <meta
      name="twitter:description"
      content="Nexa — private messaging with speed and clarity. Encrypted in transit and at rest, realtime, built on microservices."
    />
    <meta name="twitter:image" content="https://nexa-c.com/og-image.png" />
    <meta name="twitter:image:alt" content="Nexa — secure-first messenger" />
    <title>Nexa — Secure Messenger</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Structured data for richer search results (SEO audit, Phase 4). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Nexa",
        "applicationCategory": "CommunicationApplication",
        "operatingSystem": "Web, Android, iOS, Windows, macOS",
        "url": "https://nexa-c.com/",
        "description": "Nexa — private messaging with speed and clarity. Encrypted in transit and at rest, realtime, built on microservices.",
        "image": "https://nexa-c.com/og-image.png",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
    <!-- Critical font preloads — Latin subsets only; other subsets (Cyrillic, ext)
         load lazily after CSS is parsed. Avoids FOIT on first render. -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/montserrat-400-latin.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/montserrat-700-latin.woff2" crossorigin />
    <!-- Fonts are self-hosted (src/styles/fonts.css → /fonts/*.woff2). No request
         to Google Fonts: zero third-party origins on any page incl. auth + chat. -->
    <style>
      .skip-link{position:absolute;left:-999px;top:auto;width:1px;height:1px;overflow:hidden}
      .skip-link:focus{left:0;top:0;width:auto;height:auto;padding:0.5rem 1rem;background:#4f7cff;color:#fff;font-weight:600;border-radius:0 0 8px 0;z-index:9999;overflow:visible}
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="root"></div>
    <!--
      Static, non-React blackout backstop. Lives OUTSIDE #root so it survives even
      if React unmounts or has not mounted yet. privacySeal.ts toggles it via the
      `hidden` attribute / inline display on every screenshot attempt. Present from
      the first byte so capture protection does not depend on the JS bundle loading.
    -->
    <!-- Styling for #privacy-shield-native lives in global.css (render-blocking),
         so no inline style attribute is needed and style-src can drop 'unsafe-inline'. -->
    <div id="privacy-shield-native" hidden aria-hidden="true"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
