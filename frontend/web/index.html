<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#050508" id="meta-theme-color" />
    <script>
      (function () {
        var theme = "dark";
        try {
          var raw = localStorage.getItem("securechat_settings");
          if (raw) {
            var s = JSON.parse(raw);
            if (s.theme === "light" || s.theme === "dark") theme = s.theme;
            else if (s.theme === "system" && window.matchMedia("(prefers-color-scheme: light)").matches)
              theme = "light";
          }
        } catch (e) {}
        document.documentElement.dataset.theme = theme;
        var meta = document.getElementById("meta-theme-color");
        if (meta) meta.content = theme === "light" ? "#f0f2fa" : "#050508";
      })();
    </script>
    <meta http-equiv="ScreenCapture" content="deny" />
    <meta name="robots" content="index, follow" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta
      name="description"
      content="Nexa — secure-first messenger. Telegram-grade UX with Signal-grade privacy engineering."
    />
    <meta name="application-name" content="Nexa" />
    <meta property="og:title" content="Nexa" />
    <meta
      property="og:description"
      content="Production-shaped secure messenger — realtime, E2EE-ready, microservices."
    />
    <meta property="og:type" content="website" />
    <title>Nexa — Secure Messenger</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
  </head>
  <body style="margin: 0; background: #050508; color: #f4f4f8">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
