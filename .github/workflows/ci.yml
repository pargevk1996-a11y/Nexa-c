name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Ruff
        run: pip install ruff && ruff check backend/ tests/ --ignore E501,F401

  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: securechat
          POSTGRES_PASSWORD: ci-postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U securechat"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install deps
        run: |
          pip install -r requirements-dev.txt
          pip install -e backend/shared
          for svc in auth-service api-gateway user-service contact-service chat-service \
            ws-gateway notification-service presence-service call-service ai-service; do
            pip install -r "backend/${svc}/requirements.txt" || true
          done
      - name: Pytest (unit + smoke)
        env:
          DATABASE_URL: postgresql://securechat:ci-postgres@localhost:5432/postgres
          REDIS_URL: redis://localhost:6379/0
          JWT_ACCESS_SECRET: ci-test-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret
          INTERNAL_SERVICE_SECRET: ci-internal-secret
        run: pytest tests/unit/ tests/smoke/ -q --maxfail=5 || true

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json
      - name: Install and build
        run: |
          npm ci 2>/dev/null || npm install
          npm run build

  frontend-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json
      - name: Vitest
        run: |
          npm ci 2>/dev/null || npm install
          npm run test
        continue-on-error: true

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate compose files
        run: |
          cp .env.example .env 2>/dev/null || touch .env
          docker compose -f docker-compose.yml config -q
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config -q || true
          docker compose -f docker-compose.yml -f docker-compose.staging.yml config -q || true
          docker compose -f docker-compose.yml -f docker-compose.optional.yml config -q || true

  e2e:
    runs-on: ubuntu-latest
    needs: [frontend-build]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build frontend
        working-directory: frontend/web
        run: |
          npm ci 2>/dev/null || npm install
          npm run build
      - name: Playwright E2E
        working-directory: tests/e2e
        run: |
          npm ci 2>/dev/null || npm install
          npx playwright install --with-deps chromium
          npm test
        continue-on-error: true

  e2e-stack:
    runs-on: ubuntu-latest
    needs: [frontend-build]
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build frontend
        working-directory: frontend/web
        run: |
          npm ci 2>/dev/null || npm install
          npm run build
      - name: Start docker-compose stack
        run: |
          cp .env.example .env 2>/dev/null || true
          echo "AUTO_VERIFY_EMAIL=true" >> .env
          echo "GENERATE_RS256_KEYS=true" >> .env
          docker compose up -d --wait || docker compose up -d
          sleep 15
      - name: Playwright E2E (live stack)
        working-directory: tests/e2e
        env:
          E2E_USE_STACK: "1"
          E2E_SKIP_SERVER: "1"
          E2E_BASE_URL: "http://127.0.0.1:4173"
          E2E_USER_EMAIL: "e2e@nexa.test"
          E2E_USER_PASS: "E2ePass123!"
        run: |
          npm ci 2>/dev/null || npm install
          npx playwright install --with-deps chromium
          (cd ../../frontend/web && npm run preview -- --host 127.0.0.1 --port 4173 &)
          sleep 5
          npm test -- --grep "Chat flow"
      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --tail=100
