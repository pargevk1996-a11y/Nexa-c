name: Security

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit[toml] && bandit -r backend/ -c bandit.yaml -ll -x tests/
        continue-on-error: true

  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "0"
          format: table

  trivy-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-service
          - api-gateway
          - chat-service
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f backend/${{ matrix.service }}/Dockerfile -t nexa-${{ matrix.service }}:ci .
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: nexa-${{ matrix.service }}:ci
          severity: CRITICAL,HIGH
          exit-code: "0"
          format: table

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python, javascript-typescript
      - uses: github/codeql-action/analyze@v3

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
