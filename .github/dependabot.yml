version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]
    open-pull-requests-limit: 10

  - package-ecosystem: npm
    directory: /frontend/web
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /backend/auth-service
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
