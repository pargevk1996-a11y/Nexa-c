[pytest]
testpaths = tests
python_files = test_*.py
addopts = -q --tb=short -m "not load and not e2e"
filterwarnings =
    ignore::DeprecationWarning
markers =
    unit: fast isolated unit tests
    integration: HTTP API integration tests
    websocket: WebSocket protocol tests
    security: security-focused API tests
    smoke: service health smoke tests
    load: Locust load tests (run manually)
    e2e: Playwright browser tests (run separately)
